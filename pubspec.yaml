name: zento_pos
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: # Required for built-in RTL widgets support
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.2.0
  google_fonts: ^6.3.2
  intl: ^0.20.2
  crypto: ^3.0.7
  shared_preferences: ^2.5.2
  ffi: ^2.0.2
  win32: ^5.15.0
  bitsdojo_window: ^0.1.6
  file_picker: 8.1.7 
  share_plus: 10.1.4
  # --- DATABASE ---
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0+1
  path: ^1.9.0
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  dbcrypt: ^2.0.0
  esc_pos_utils_plus: ^2.0.4
  flutter_pos_printer_platform_image_3: ^1.0.6
  fl_chart: ^1.1.1
  pdf: ^3.11.3
  printing: ^5.14.2
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: any

flutter:
  uses-material-design: true
  assets:
    - logo/

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "logo/applogo.png"
  windows:
    generate: true
    icon_size: 48
    foreground_image_path: "logo/applogo.png"
